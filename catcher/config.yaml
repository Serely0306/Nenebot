# 监听设置
listen: "0.0.0.0:8888"

# 上传服务器地址 (你的 LunaBot 上传服务)
# 格式: http://IP:端口
# 上传接口: {upload_server}/api/{region}/user/{uid}/upload/mysekai
upload_server: "http://182.254.176.236:5000"

# 是否自动上传到服务器
auto_upload: true

# 是否保存原始数据到本地
save_locally: false
save_dir: "./data"

# Android 代理 IP
# 留空则自动检测本机 IP
# 如果设置后设备无法联网，尝试设置为 "127.0.0.1"
android_proxy_ip: ""

# 调试模式 (打印更多日志)
debug: false

# ==================== 抓取控制 ====================
# 是否抓取 MySekai 数据
capture_mysekai: false

# 是否抓取 Suite 数据
capture_suite: true

# 强制全量刷新 MySekai：将请求中的 isForceAllReloadOnlyMysekai=False 篡改为 True
# 开启后每次进入 MySekai 页面都会获取完整数据（而不是仅第一次进入）
# 开启此项会自动启用 capture_mysekai
force_mysekai_reload: true

# 仅对游戏 API 域名执行 MITM (推荐开启，减少不必要的拦截)
mitm_target_only: true

# ==================== 证书配置 (可选) ====================
# 如果你想复用已安装的证书（如 HarukiProxy 的证书），可以设置以下路径
# 留空则自动生成新证书（需要重新安装到系统）

# 外部证书路径 (PEM 格式)
# 例如 HarukiProxy 的证书通常位于: /data/local/tmp/harukiproxy/
external_cert_path: "/data/local/tmp/harukiproxy/ca.pem"

# 外部私钥路径 (PEM 格式)
external_key_path: "/data/local/tmp/harukiproxy/ca.key"
