# Android 专用配置文件
# 将此文件放置在 /data/local/tmp/lunabot-catcher/ 目录下

# 监听设置
listen: "0.0.0.0:8888"

# 上传服务器地址 (你的 LunaBot 上传服务)
# 格式: http://IP:端口
upload_server: "http://你的服务器IP:5000"

# 是否自动上传到服务器
auto_upload: true

# 是否保存原始数据到本地 (用于调试)
save_locally: true
save_dir: "./data"

# Android 代理 IP
# 建议设置为 127.0.0.1，否则可能导致虚拟机无法联网
android_proxy_ip: "127.0.0.1"

# 调试模式 (打印更多日志)
debug: false

# ==================== 证书配置 ====================
# 如果你已经安装过 HarukiProxy 的证书，可以复用它
# 这样就不需要重新安装证书

# HarukiProxy 证书路径 (如果有)
external_cert_path: "/data/local/tmp/harukiproxy/ca.pem"
external_key_path: "/data/local/tmp/harukiproxy/ca.key"

# 如果没有 HarukiProxy 证书，留空会自动生成新证书
# 但需要手动安装到系统证书目录
# external_cert_path: ""
# external_key_path: ""
