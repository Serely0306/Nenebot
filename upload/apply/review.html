<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核管理 — Nene-LunaBot</title>
    <style>
        :root {
            --bg-start: #faf8f3; --bg-end: #f5f0fa;
            --card-bg: #ffffff; --card-border: #e8e4f0;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.04);
            --text: #2d2050; --text-secondary: #6b5e8a; --text-muted: #9b8eb8;
            --input-bg: #ffffff; --input-border: #e2ddf0;
            --btn-gradient: linear-gradient(135deg, #ff6b9d 0%, #ffa940 100%);
            --btn-shadow: 0 4px 14px rgba(255,107,157,0.3);
            --success: #44c7b4; --error: #d06060; --pending: #ffa940;
            --approve-bg: linear-gradient(135deg, #44c7b4 0%, #3ab09e 100%);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh; color: var(--text); line-height: 1.6;
        }

        /* 锁定态 */
        .lock-container {
            max-width: 380px; margin: 120px auto 0; padding: 20px;
        }
        .lock-card {
            background: var(--card-bg); border-radius: 20px; padding: 44px 32px;
            border: 1.5px solid var(--card-border); box-shadow: var(--card-shadow);
            text-align: center;
        }
        .lock-icon {
            width: 56px; height: 56px; margin: 0 auto 16px;
            background: linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,169,64,0.12));
            border: 2px solid rgba(255,107,157,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .lock-card h2 { font-size: 1.1rem; margin-bottom: 4px; }
        .lock-card .subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; }
        .lock-card input {
            width: 100%; padding: 12px 16px; background: var(--input-bg);
            border: 1.5px solid var(--input-border); border-radius: 10px;
            color: var(--text); text-align: center; font-size: 0.9rem;
            margin-bottom: 14px; outline: none; letter-spacing: 2px;
        }
        .lock-card input:focus {
            border-color: #a090d0;
            box-shadow: 0 0 0 3px rgba(160,144,208,0.15);
        }
        .lock-card button {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: var(--btn-gradient); color: #fff; font-weight: 700;
            font-size: 0.9rem; cursor: pointer; box-shadow: var(--btn-shadow);
        }

        /* 审核面板 */
        .panel-container {
            max-width: 640px; margin: 0 auto; padding: 30px 20px; display: none;
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px;
        }
        .panel-header h2 { font-size: 1.1rem; }
        .panel-header .count { font-size: 0.82rem; color: var(--text-muted); }
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
        .filter-tab {
            padding: 6px 16px; border-radius: 20px; font-size: 0.78rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
            background: transparent; border: 1.5px solid var(--card-border); color: var(--text-muted);
        }
        .filter-tab.active {
            background: rgba(100,80,200,0.1); border-color: rgba(100,80,200,0.25);
            color: #5b4cc4;
        }
        .app-card {
            background: var(--card-bg); border-radius: var(--radius);
            border: 1.5px solid var(--card-border); padding: 16px;
            margin-bottom: 10px; box-shadow: var(--card-shadow);
        }
        .app-card.pending { border-left: 4px solid var(--pending); }
        .app-card.approved { border-left: 4px solid var(--success); }
        .app-card.rejected { border-left: 4px solid var(--error); }
        .app-card.auto-rejected {
            border-left: 3px solid #d06060;
        }
        .app-card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .app-card-header .group-name { font-weight: 700; font-size: 0.92rem; }
        .app-card-header .group-size { color: var(--text-muted); margin-left: 6px; font-size: 0.82rem; }
        .pill {
            padding: 3px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
        }
        .pill.pending { background: rgba(255,169,64,0.12); color: var(--pending); }
        .pill.approved { background: rgba(68,199,180,0.12); color: var(--success); }
        .pill.rejected { background: rgba(208,96,96,0.1); color: var(--error); }
        .app-card-body { font-size: 0.84rem; color: var(--text-secondary); margin-bottom: 4px; }
        .app-card-meta { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 10px; }
        .app-card-actions { display: flex; gap: 8px; }
        .btn-approve {
            padding: 6px 18px; border: none; border-radius: 8px;
            background: var(--approve-bg); color: #fff; font-size: 0.8rem;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(68,199,180,0.25);
        }
        .btn-reject {
            padding: 6px 18px; border: 1.5px solid #f0c0c0; border-radius: 8px;
            background: #fff; color: var(--error); font-size: 0.8rem;
            font-weight: 600; cursor: pointer;
        }
        .btn-revoke {
            background: #fff;
            color: #6b5e8a;
            border: 1.5px solid #e2ddf0;
            border-radius: 10px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-revoke:hover {
            background: #f5f0fa;
            border-color: #a090d0;
        }
        /* Profile cards */
        .profile-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
        }
        .profile-row img {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
            background: #f0ecf8; flex-shrink: 0;
        }
        .profile-info { flex: 1; min-width: 0; }
        .profile-info .name { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-info .sub { font-size: 0.75rem; color: var(--text-muted); }
        .card-divider { border: none; border-top: 1px solid #f0ecf8; margin: 8px 0; }
        .app-ip { font-family: 'SF Mono', 'Cascadia Code', monospace; }
        /* IP Panel */
        .ip-panel {
            background: var(--card-bg); border-radius: var(--radius);
            border: 1.5px solid var(--card-border); padding: 16px;
            margin-bottom: 14px; box-shadow: var(--card-shadow);
        }
        .ip-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        .ip-panel-header h3 { font-size: 0.9rem; margin: 0; }
        .ip-panel-header .arrow { transition: transform 0.2s; font-size: 0.8rem; color: var(--text-muted); }
        .ip-panel.open .ip-panel-header .arrow { transform: rotate(90deg); }
        .ip-panel-body { display: none; margin-top: 12px; }
        .ip-panel.open .ip-panel-body { display: block; }
        .ip-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .ip-table th, .ip-table td {
            padding: 6px 10px; text-align: left; border-bottom: 1px solid #f0ecf8;
        }
        .ip-table th { color: var(--text-muted); font-weight: 600; font-size: 0.72rem; }
        .ip-table .mono { font-family: 'SF Mono', 'Cascadia Code', monospace; }
        .btn-ip-remove {
            padding: 3px 10px; border: 1px solid #f0c0c0; border-radius: 6px;
            background: #fff; color: var(--error); cursor: pointer; font-size: 0.72rem;
        }
        .btn-ip-add {
            padding: 4px 12px; border: 1px solid var(--input-border); border-radius: 6px;
            background: #fff; color: var(--text-secondary); cursor: pointer; font-size: 0.72rem;
        }
        .footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.78rem; }
    </style>
</head>
<body>
<!-- 锁定态 -->
<div id="lockScreen" class="lock-container">
    <div class="lock-card">
        <div class="lock-icon">🔐</div>
        <h2>管理员验证</h2>
        <p class="subtitle">输入管理密钥以访问审核面板</p>
        <input type="password" id="tokenInput" placeholder="密钥" autofocus>
        <button id="unlockBtn">验证</button>
    </div>
</div>

<!-- 审核面板 -->
<div id="panelScreen" class="panel-container">
    <div class="panel-header">
        <h2>审核管理</h2>
        <span class="count" id="totalCount">共 0 条</span>
    </div>
    <div class="filter-tabs" id="filterTabs">
        <span class="filter-tab active" data-status="">全部</span>
        <span class="filter-tab" data-status="pending">待审核</span>
        <span class="filter-tab" data-status="approved">已通过</span>
        <span class="filter-tab" data-status="rejected">已拒绝</span>
        <span class="filter-tab" id="showDeletedTab" data-show-deleted="1" style="margin-left:auto;">🗑 已删除</span>
    </div>
    <div id="ipPanel" class="ip-panel">
        <div class="ip-panel-header" id="ipPanelToggle">
            <h3>IP 管理</h3>
            <span class="arrow">▶</span>
        </div>
        <div class="ip-panel-body" id="ipPanelBody"></div>
    </div>
    <div id="appList"></div>
    <div class="footer">Nene-LunaBot Review Panel</div>
</div>

<script src="review.js"></script>
</body>
</html>
