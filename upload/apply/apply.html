<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot 加群申请 — Nene-LunaBot</title>
    <style>
        :root {
            --bg-start: #faf8f3;
            --bg-end: #f5f0fa;
            --card-bg: #ffffff;
            --card-border: #e8e4f0;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.04);
            --text: #2d2050;
            --text-secondary: #6b5e8a;
            --text-muted: #9b8eb8;
            --input-bg: #ffffff;
            --input-border: #e2ddf0;
            --input-focus: #a090d0;
            --btn-gradient: linear-gradient(135deg, #ff6b9d 0%, #ffa940 100%);
            --btn-shadow: 0 4px 14px rgba(255,107,157,0.3);
            --success: #44c7b4;
            --error: #d06060;
            --pending: #ffa940;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh; color: var(--text); line-height: 1.6;
        }
        .container {
            max-width: 520px; margin: 0 auto; padding: 40px 20px;
        }
        .card {
            background: var(--card-bg); border-radius: 16px; padding: 36px 32px;
            border: 1.5px solid var(--card-border); box-shadow: var(--card-shadow);
        }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .header .subtitle { font-size: 0.82rem; color: var(--text-muted); }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 5px;
        }
        .form-group label .required { color: #ff6b9d; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 11px 14px; background: var(--input-bg);
            border: 1.5px solid var(--input-border); border-radius: 10px;
            color: var(--text); font-size: 0.9rem; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(160,144,208,0.15);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn-submit {
            width: 100%; padding: 13px; border: none; border-radius: var(--radius);
            background: var(--btn-gradient); color: #fff; font-size: 0.95rem;
            font-weight: 700; cursor: pointer; box-shadow: var(--btn-shadow);
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-submit:hover { transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .message {
            margin-top: 16px; padding: 12px 16px; border-radius: 10px;
            font-size: 0.85rem; display: none;
        }
        .message.success { display: block; background: rgba(68,199,180,0.1); color: var(--success); border: 1px solid rgba(68,199,180,0.2); }
        .message.error { display: block; background: rgba(208,96,96,0.08); color: var(--error); border: 1px solid rgba(208,96,96,0.15); }
        .divider { border: none; border-top: 1px solid var(--card-border); margin: 28px 0; }
        .status-section h3 { font-size: 0.95rem; margin-bottom: 12px; }
        .status-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: #faf8fb; border-radius: 10px;
            margin-bottom: 8px; border: 1px solid var(--card-border);
        }
        .status-card .group-info { font-size: 0.85rem; font-weight: 600; }
        .status-card .group-meta { font-size: 0.78rem; color: var(--text-muted); }
        .pill {
            padding: 3px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .pill.pending { background: rgba(255,169,64,0.12); color: var(--pending); }
        .pill.approved { background: rgba(68,199,180,0.12); color: var(--success); }
        .pill.rejected { background: rgba(208,96,96,0.1); color: var(--error); }
        .footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.78rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>Bot 加群申请</h1>
            <p class="subtitle">填写信息提交申请，管理员审核后处理</p>
        </div>
        <form id="applyForm">
            <div class="form-group">
                <label>QQ群号 <span class="required">*</span></label>
                <input type="text" id="group_id" placeholder="请输入目标群号" maxlength="20" required>
            </div>
            <div class="form-group">
                <label>拉群目的 <span class="required">*</span></label>
                <textarea id="purpose" placeholder="请说明拉 Bot 进群的用途..." required></textarea>
            </div>
            <div class="form-group">
                <label>申请人QQ号 <span class="required">*</span></label>
                <input type="text" id="applicant" placeholder="你的 QQ 号，用于查询审核结果" maxlength="20" required>
            </div>
            <button type="submit" class="btn-submit">提交申请</button>
        </form>
        <div class="message" id="message"></div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <div class="status-section">
            <h3>查询申请状态</h3>
            <div class="form-group">
                <input type="text" id="queryQQ" placeholder="输入你的 QQ 号查询审核进度" maxlength="20">
            </div>
            <button class="btn-submit" id="queryBtn" style="margin-top:8px;">查询</button>
            <div id="queryResult" style="margin-top: 12px;"></div>
        </div>
    </div>
    <div class="footer">NeneBot</div>
</div>
<script src="apply.js"></script>
</body>
</html>
