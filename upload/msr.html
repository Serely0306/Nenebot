<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySekai MSR 查询</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container container-wide">
        <div class="card">
            <div id="accessGate">
                <div class="header">
                    <h1>MySekai MSR 查询</h1>
                    <p class="subtitle">请先验证 access_key，验证通过后才会显示查询页面。</p>
                </div>

                <div class="step">
                    <div class="step-header">
                        <span class="step-number">1</span>
                        <span class="step-title">验证 access_key</span>
                    </div>

                    <div class="form-group">
                        <label for="accessKey">access_key</label>
                        <input type="password" id="accessKey" class="input" placeholder="请输入你在 upload/config.yaml 中设置的 access_key">
                    </div>

                    <button class="btn-query" id="validateBtn">
                        <span class="btn-text">验证并进入</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>
            </div>

            <div id="mainApp" style="display: none;">
                <div class="header">
                    <h1>MySekai MSR 查询</h1>
                    <p class="subtitle">输入 QQ 号，选择已绑定账号，返回当前 MSR 地图。</p>
                </div>

                <div id="step1" class="step">
                    <div class="step-header">
                        <span class="step-number">1</span>
                        <span class="step-title">选择区服并查询绑定账号</span>
                    </div>

                    <div class="form-group">
                        <label for="region">游戏区服</label>
                        <select id="region" class="select">
                            <option value="jp">JP</option>
                            <option value="cn" selected>CN</option>
                            <option value="tw">TW</option>
                            <option value="kr">KR</option>
                            <option value="en">EN</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="qqId">QQ 号</label>
                        <input type="text" id="qqId" class="input" placeholder="请输入在 Nene-LunaBot 中绑定账号时使用的 QQ 号">
                    </div>

                    <button class="btn-query" id="queryBtn">
                        <span class="btn-text">查询绑定账号</span>
                        <span class="btn-icon">→</span>
                    </button>

                    <div class="query-result" id="queryResult" style="display: none;"></div>
                </div>

                <div id="step2" class="step" style="display: none;">
                    <div class="step-header">
                        <span class="step-number">2</span>
                        <span class="step-title">选择要查询的账号</span>
                    </div>

                    <div class="accounts-list" id="accountsList"></div>
                    <div class="selected-account-info" id="selectedAccountInfo"></div>

                    <button class="btn-upload btn-msr" id="renderBtn" disabled>
                        <span class="btn-text">查询 MSR 地图</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>

                <div id="resultPanel" class="result-panel" style="display: none;">
                    <div class="result-header">
                        <h3>MSR 地图结果</h3>
                        <a id="downloadLink" class="result-download" download="msr-map.png">下载图片</a>
                    </div>
                    <div class="result-meta" id="resultMeta"></div>
                    <img id="resultImage" class="result-image" alt="MSR map result">
                </div>

                <div class="help-section">
                    <h3>使用说明</h3>
                    <ol>
                        <li>先验证 `access_key`。</li>
                        <li>输入 QQ 号并查询当前 QQ 在对应区服绑定的账号。</li>
                        <li>选择账号后直接返回 MSR 地图，不输出总览图。</li>
                    </ol>
                </div>
            </div>

            <div class="message" id="message"></div>
        </div>

        <footer class="footer">
            <p>Nene-LunaBot MySekai MSR Service</p>
        </footer>
    </div>

    <script src="msr.js"></script>
</body>
</html>
