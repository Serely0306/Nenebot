# 日服
jp:
  profile_api_url:                "http://127.0.0.1:9999/api/jp/{uid}/profile"       # 游戏API: 获取用户profile
  suite_api_url:                  "https://suite-api.haruki.seiunx.com/public/jp/suite/{uid}?key=userGamedata,"         # 游戏API: 获取用户suite
  mysekai_api_url:                "http://127.0.0.1:5000/api/mysekai/jp/{uid}"       # 游戏API: 获取用户mysekai
  mysekai_photo_api_url:          "http://127.0.0.1:9999/api/jp/mysekai/photo"            # 游戏API: 获取用户ms照片
  ranking_api_url:                "http://127.0.0.1:9999/api/jp/event/{event_id}/ranking-border" # 游戏API: 获取活动排名
  send_boost_api_url:             "http://127.0.0.1:9999/api/jp/user/{uid}/send_boost"    # 游戏API: 送火
  create_account_api_url:         "https://xxx/api/jp/create_account"           # 游戏API: 创建账号
  
  # suite和mysekai数据需要包含upload_time字段，内容为单位为秒的时间戳
  # 目前使用到的suite数据字段：'userCards','userDecks','userGamedata','userMusics','userMusicResults','userMysekaiMaterials','userAreas','userChallengeLiveSoloDecks','userCharacters','userMysekaiCanvases','userMysekaiFixtureGameCharacterPerformanceBonuses','userMysekaiGates','userWorldBloomSupportDecks','userHonors','userMysekaiCharacterTalks','userChallengeLiveSoloResults','userChallengeLiveSoloStages','userChallengeLiveSoloHighScoreRewards','userEvents','userWorldBlooms','userMusicAchievements','userPlayerFrames','userMaterials','upload_time',
  # 字节服suite数据中的compact格式字段需要处理为日服同格式

